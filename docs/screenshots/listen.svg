<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d12"/>
      <stop offset="100%" style="stop-color:#16161d"/>
    </linearGradient>
    <linearGradient id="progress" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="375" height="812" fill="url(#bg)"/>
  <!-- Header -->
  <text x="188" y="90" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#f4f4f5" text-anchor="middle">Fix the auth flow</text>
  <text x="188" y="115" font-family="system-ui,sans-serif" font-size="13" fill="#71717a" text-anchor="middle">API · High priority</text>
  <!-- Progress bar -->
  <rect x="20" y="130" width="335" height="3" rx="1.5" fill="#1e1e28"/>
  <rect x="20" y="130" width="95" height="3" rx="1.5" fill="url(#progress)"/>
  <!-- Content area -->
  <g transform="translate(20, 165)">
    <!-- Paragraph 1 -->
    <text x="0" y="0" font-family="system-ui,sans-serif" font-size="16" fill="#71717a" line-height="1.8">
      <tspan>The authentication middleware needs a complete</tspan>
    </text>
    <text x="0" y="28" font-family="system-ui,sans-serif" font-size="16" fill="#71717a">overhaul. The current implementation has several</text>
    <!-- Highlighted sentence (currently playing) -->
    <rect x="-5" y="38" width="350" height="28" rx="4" fill="#f59e0b" opacity="0.2"/>
    <text x="0" y="58" font-family="system-ui,sans-serif" font-size="16" fill="#f4f4f5" font-weight="500">security vulnerabilities that need to be addressed</text>
    <text x="0" y="86" font-family="system-ui,sans-serif" font-size="16" fill="#f4f4f5" font-weight="500">before the next deployment.</text>
    <!-- Paragraph 2 -->
    <text x="0" y="114" font-family="system-ui,sans-serif" font-size="16" fill="#71717a">First, we need to implement proper token validation.</text>
    <text x="0" y="142" font-family="system-ui,sans-serif" font-size="16" fill="#71717a">The current JWT handling doesn't verify signature</text>
    <text x="0" y="170" font-family="system-ui,sans-serif" font-size="16" fill="#71717a">correctly, which is a critical security issue.</text>
    <text x="0" y="198" font-family="system-ui,sans-serif" font-size="16" fill="#71717a">We should also add rate limiting to prevent brute</text>
    <text x="0" y="226" font-family="system-ui,sans-serif" font-size="16" fill="#71717a">force attacks on the login endpoint.</text>
    <!-- More content hint -->
    <text x="0" y="280" font-family="system-ui,sans-serif" font-size="14" fill="#52525b" font-style="italic">... 847 more words</text>
  </g>
  <!-- TTS Controls bar (glass effect at bottom) -->
  <rect x="0" y="640" width="375" height="120" fill="#16161d" opacity="0.95" rx="20 20 0 0"/>
  <rect y="640" width="375" height="1" fill="#1e1e28"/>
  <!-- Play/Pause -->
  <g transform="translate(30, 660)">
    <circle cx="36" cy="36" r="36" fill="#f59e0b"/>
    <polygon points="44,30 56,42 44,54" fill="#0d0d12"/>
    <!-- Speaker wave -->
    <rect x="90" y="26" width="3" height="20" rx="1.5" fill="#f59e0b" opacity="0.3"/>
    <rect x="98" y="20" width="3" height="32" rx="1.5" fill="#f59e0b" opacity="0.4"/>
    <rect x="106" y="14" width="3" height="44" rx="1.5" fill="#f59e0b" opacity="0.6"/>
  </g>
  <!-- Skip back -->
  <g transform="translate(170, 676)">
    <text x="20" y="20" font-family="system-ui,sans-serif" font-size="18" fill="#71717a">⏪</text>
    <text x="20" y="36" font-family="system-ui,sans-serif" font-size="9" fill="#52525b" text-anchor="middle">15s</text>
  </g>
  <!-- Skip forward -->
  <g transform="translate(220, 676)">
    <text x="20" y="20" font-family="system-ui,sans-serif" font-size="18" fill="#71717a">⏩</text>
    <text x="20" y="36" font-family="system-ui,sans-serif" font-size="9" fill="#52525b" text-anchor="middle">15s</text>
  </g>
  <!-- Speed selector -->
  <g transform="translate(280, 665)">
    <rect x="0" y="0" width="70" height="56" rx="12" fill="#1e1e28"/>
    <text x="35" y="22" font-family="system-ui,sans-serif" font-size="11" fill="#71717a" text-anchor="middle">Speed</text>
    <text x="35" y="44" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#f59e0b" text-anchor="middle">1×</text>
  </g>
  <!-- Time display -->
  <text x="188" y="760" font-family="JetBrains Mono, monospace" font-size="13" fill="#71717a" text-anchor="middle">1:24 / 8:32</text>
  <!-- Sleep timer -->
  <g transform="translate(300, 750)">
    <rect x="0" y="0" width="55" height="28" rx="14" fill="#1e1e28"/>
    <text x="28" y="18" font-family="system-ui,sans-serif" font-size="11" fill="#71717a" text-anchor="middle">🌙 30m</text>
  </g>
  <!-- Tab bar -->
  <rect y="730" width="375" height="82" fill="#16161d"/>
  <rect y="730" width="375" height="1" fill="#1e1e28"/>
  <g transform="translate(47,732)">
    <rect x="0" y="12" width="24" height="24" rx="4" fill="#1e1e28"/>
    <rect x="2" y="18" width="8" height="12" rx="4" fill="#71717a"/>
    <rect x="10" y="22" width="6" height="8" rx="3" fill="#71717a"/>
    <rect x="6" y="28" width="12" height="2" rx="1" fill="#71717a"/>
    <text y="50" font-family="system-ui" font-size="10" fill="#71717a" text-anchor="middle">Capture</text>
  </g>
  <g transform="translate(132,732)">
    <rect x="0" y="12" width="24" height="24" rx="4" fill="#1e1e28"/>
    <text x="12" y="22" font-family="system-ui" font-size="7" fill="#71717a" text-anchor="middle">📚</text>
    <text y="50" font-family="system-ui" font-size="10" fill="#71717a" text-anchor="middle">Library</text>
  </g>
  <g transform="translate(217,732)">
    <circle cx="12" cy="24" r="10" fill="none" stroke="#71717a" stroke-width="2"/>
    <path d="M12 16 L12 20 L14 22" stroke="#71717a" stroke-width="2" fill="none"/>
    <text y="50" font-family="system-ui" font-size="10" fill="#71717a" text-anchor="middle">Focus</text>
  </g>
  <g transform="translate(302,732)">
    <rect x="4" y="16" width="16" height="16" rx="3" fill="none" stroke="#71717a" stroke-width="2"/>
    <circle cx="12" cy="24" r="2" fill="#71717a"/>
    <text y="50" font-family="system-ui" font-size="10" fill="#71717a" text-anchor="middle">Settings</text>
  </g>
</svg>