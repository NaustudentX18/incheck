<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d12"/>
      <stop offset="100%" style="stop-color:#16161d"/>
    </linearGradient>
    <linearGradient id="micGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="375" height="812" fill="url(#bg)"/>
  <!-- Status bar -->
  <rect y="0" width="375" height="44" fill="#0d0d12" opacity="0.8"/>
  <text x="185" y="28" font-family="system-ui" font-size="14" fill="#71717a" text-anchor="middle">9:41</text>
  <!-- Header -->
  <text x="188" y="100" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#f4f4f5" text-anchor="middle">Capture</text>
  <!-- Subtitle -->
  <text x="188" y="130" font-family="system-ui,sans-serif" font-size="14" fill="#71717a" text-anchor="middle">Dump your brain, let AI sort it out</text>
  <!-- Text area -->
  <rect x="20" y="165" width="335" height="200" rx="16" fill="#16161d" stroke="#1e1e28" stroke-width="1"/>
  <text x="36" y="195" font-family="system-ui,sans-serif" font-size="14" fill="#52525b">Type or paste your thoughts here...</text>
  <text x="36" y="230" font-family="system-ui,sans-serif" font-size="13" fill="#71717a">Example: I need to fix the auth flow, update the</text>
  <text x="36" y="255" font-family="system-ui,sans-serif" font-size="13" fill="#71717a">docs, and research Tailscale for the home server</text>
  <!-- Char count -->
  <text x="335" y="360" font-family="system-ui,sans-serif" font-size="11" fill="#52525b" text-anchor="end">142</text>
  <!-- Save button -->
  <rect x="20" y="385" width="335" height="52" rx="26" fill="#f59e0b"/>
  <text x="188" y="418" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#0d0d12" text-anchor="middle">Save Capture</text>
  <!-- Mic button -->
  <circle cx="188" cy="560" r="52" fill="url(#micGlow)"/>
  <circle cx="188" cy="540" r="40" fill="#16161d" stroke="#f59e0b" stroke-width="3"/>
  <!-- Pulse rings -->
  <circle cx="188" cy="540" r="48" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <circle cx="188" cy="540" r="56" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.15"/>
  <!-- Mic icon -->
  <rect x="181" y="522" width="14" height="22" rx="7" fill="#f59e0b"/>
  <rect x="175" y="532" width="26" height="10" rx="5" fill="#f59e0b"/>
  <text x="188" y="615" font-family="system-ui,sans-serif" font-size="12" fill="#71717a" text-anchor="middle">Tap mic for voice capture</text>
  <!-- Tab bar -->
  <rect y="730" width="375" height="82" fill="#16161d"/>
  <rect y="730" width="375" height="1" fill="#1e1e28"/>
  <!-- Active tab -->
  <rect x="20" y="748" width="56" height="28" rx="14" fill="#f59e0b" opacity="0.15"/>
  <!-- Tabs -->
  <g transform="translate(47,732)">
    <rect x="0" y="12" width="24" height="24" rx="4" fill="#f59e0b"/>
    <rect x="2" y="18" width="8" height="12" rx="4" fill="#0d0d12"/>
    <rect x="10" y="22" width="6" height="8" rx="3" fill="#0d0d12"/>
    <rect x="6" y="28" width="12" height="2" rx="1" fill="#0d0d12"/>
    <text y="50" font-family="system-ui" font-size="10" fill="#f59e0b" text-anchor="middle">Capture</text>
  </g>
  <g transform="translate(132,732)">
    <rect x="0" y="12" width="24" height="24" rx="4" fill="#1e1e28"/>
    <text y="50" font-family="system-ui" font-size="10" fill="#71717a" text-anchor="middle">Library</text>
  </g>
  <g transform="translate(217,732)">
    <circle cx="12" cy="24" r="10" fill="none" stroke="#71717a" stroke-width="2"/>
    <text x="12" y="28" font-family="system-ui" font-size="8" fill="#71717a" text-anchor="middle">12</text>
    <path d="M12 16 L12 20 L14 22" stroke="#71717a" stroke-width="2" fill="none"/>
    <text y="50" font-family="system-ui" font-size="10" fill="#71717a" text-anchor="middle">Focus</text>
  </g>
  <g transform="translate(302,732)">
    <rect x="4" y="16" width="16" height="16" rx="3" fill="none" stroke="#71717a" stroke-width="2"/>
    <circle cx="12" cy="24" r="2" fill="#71717a"/>
    <text y="50" font-family="system-ui" font-size="10" fill="#71717a" text-anchor="middle">Settings</text>
  </g>
</svg>