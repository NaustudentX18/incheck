<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d12"/>
      <stop offset="100%" style="stop-color:#16161d"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="375" height="812" fill="url(#bg)"/>
  <!-- Header -->
  <text x="188" y="90" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#f4f4f5" text-anchor="middle">Focus</text>
  <!-- Ta-Da badge -->
  <rect x="275" y="70" width="80" height="24" rx="12" fill="#f59e0b" opacity="0.15"/>
  <text x="315" y="86" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#f59e0b" text-anchor="middle">🎉 2 Ta-Das</text>
  <!-- 3 Focus Slots -->
  <!-- Slot 1 (Active) -->
  <g transform="translate(15, 120)">
    <rect width="345" height="64" rx="12" fill="#16161d" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="28" cy="32" r="18" fill="#f59e0b"/>
    <text x="28" y="38" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#0d0d12" text-anchor="middle">1</text>
    <text x="65" y="28" font-family="system-ui,sans-serif" font-size="13" fill="#f4f4f5">Fix the auth flow before deploy</text>
    <text x="65" y="46" font-family="system-ui,sans-serif" font-size="11" fill="#71717a">2/4 subtasks</text>
    <rect x="240" y="16" width="70" height="32" rx="16" fill="#f59e0b"/>
    <text x="275" y="35" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0d0d12" text-anchor="middle">▶ Start</text>
  </g>
  <!-- Slot 2 -->
  <g transform="translate(15, 194)">
    <rect width="345" height="56" rx="12" fill="#16161d"/>
    <circle cx="28" cy="28" r="18" fill="#1e1e28"/>
    <text x="28" y="34" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#71717a" text-anchor="middle">2</text>
    <text x="65" y="22" font-family="system-ui,sans-serif" font-size="13" fill="#71717a">Update onboarding docs</text>
    <text x="65" y="40" font-family="system-ui,sans-serif" font-size="11" fill="#52525b">Docs project</text>
  </g>
  <!-- Slot 3 (empty) -->
  <g transform="translate(15, 260)">
    <rect width="345" height="52" rx="12" fill="#16161d" stroke="#1e1e28" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="28" y="32" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#52525b" text-anchor="middle">3</text>
    <text x="65" y="32" font-family="system-ui,sans-serif" font-size="13" fill="#52525b">+ Add focus</text>
  </g>
  <!-- Duration picker -->
  <g transform="translate(15, 340)">
    <rect width="345" height="48" rx="12" fill="#16161d"/>
    <text x="20" y="30" font-family="system-ui,sans-serif" font-size="12" fill="#71717a">Duration</text>
    <rect x="100" y="10" width="50" height="28" rx="8" fill="#1e1e28"/>
    <text x="125" y="29" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#f59e0b" text-anchor="middle">15 min</text>
    <rect x="155" y="10" width="50" height="28" rx="8" fill="#f59e0b"/>
    <text x="180" y="29" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#0d0d12" text-anchor="middle">25 min</text>
    <rect x="210" y="10" width="50" height="28" rx="8" fill="#1e1e28"/>
    <text x="235" y="29" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#71717a" text-anchor="middle">50 min</text>
    <rect x="265" y="10" width="50" height="28" rx="8" fill="#1e1e28"/>
    <text x="290" y="29" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#71717a" text-anchor="middle">90 min</text>
  </g>
  <!-- Timer display -->
  <g transform="translate(113, 420)">
    <circle cx="75" cy="75" r="70" fill="none" stroke="#1e1e28" stroke-width="8"/>
    <circle cx="75" cy="75" r="70" fill="none" stroke="url(#ring)" stroke-width="8" stroke-dasharray="395" stroke-dashoffset="100" stroke-linecap="round" transform="rotate(-90 75 75)"/>
    <text x="75" y="68" font-family="JetBrains Mono, monospace" font-size="36" font-weight="700" fill="#f4f4f5" text-anchor="middle">24:30</text>
    <text x="75" y="90" font-family="system-ui,sans-serif" font-size="12" fill="#71717a" text-anchor="middle" letter-spacing="0.1em">FOCUS</text>
  </g>
  <!-- Controls -->
  <rect x="130" y="540" width="115" height="44" rx="22" fill="#f59e0b"/>
  <text x="188" y="568" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#0d0d12" text-anchor="middle">⏸ Pause</text>
  <rect x="40" y="610" width="90" height="36" rx="18" fill="#1e1e28"/>
  <text x="85" y="633" font-family="system-ui,sans-serif" font-size="12" fill="#71717a" text-anchor="middle">Abandon</text>
  <rect x="245" y="610" width="90" height="36" rx="18" fill="#1e1e28"/>
  <text x="290" y="633" font-family="system-ui,sans-serif" font-size="12" fill="#71717a" text-anchor="middle">Reset</text>
  <!-- AI Companion card -->
  <g transform="translate(40, 670)">
    <rect width="295" height="70" rx="12" fill="#16161d" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
    <rect x="0" y="0" width="295" height="70" rx="12" fill="url(#aiGlow)" opacity="0.1"/>
    <circle cx="20" cy="25" r="10" fill="#8b5cf6" opacity="0.2"/>
    <text x="40" y="20" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#8b5cf6" letter-spacing="0.05em">AI COMPANION</text>
    <text x="15" y="46" font-family="system-ui,sans-serif" font-size="12" fill="#71717a" font-style="italic">"You're doing the thing. Just five</text>
    <text x="15" y="62" font-family="system-ui,sans-serif" font-size="12" fill="#71717a" font-style="italic">more minutes, then a break."</text>
    <text x="285" y="20" font-family="system-ui,sans-serif" font-size="10" fill="#71717a" text-anchor="end">↻</text>
  </g>
  <!-- Tab bar -->
  <rect y="730" width="375" height="82" fill="#16161d"/>
  <rect y="730" width="375" height="1" fill="#1e1e28"/>
  <g transform="translate(47,732)">
    <rect x="0" y="12" width="24" height="24" rx="4" fill="#1e1e28"/>
    <rect x="2" y="18" width="8" height="12" rx="4" fill="#71717a"/>
    <rect x="10" y="22" width="6" height="8" rx="3" fill="#71717a"/>
    <rect x="6" y="28" width="12" height="2" rx="1" fill="#71717a"/>
    <text y="50" font-family="system-ui" font-size="10" fill="#71717a" text-anchor="middle">Capture</text>
  </g>
  <g transform="translate(132,732)">
    <rect x="0" y="12" width="24" height="24" rx="4" fill="#1e1e28"/>
    <text x="12" y="22" font-family="system-ui" font-size="7" fill="#71717a" text-anchor="middle">📚</text>
    <text y="50" font-family="system-ui" font-size="10" fill="#71717a" text-anchor="middle">Library</text>
  </g>
  <g transform="translate(217,732)">
    <rect x="0" y="12" width="24" height="24" rx="4" fill="#f59e0b" opacity="0.15"/>
    <circle cx="12" cy="24" r="8" fill="#f59e0b"/>
    <text y="50" font-family="system-ui" font-size="10" fill="#f59e0b" text-anchor="middle">Focus</text>
  </g>
  <g transform="translate(302,732)">
    <rect x="4" y="16" width="16" height="16" rx="3" fill="none" stroke="#71717a" stroke-width="2"/>
    <circle cx="12" cy="24" r="2" fill="#71717a"/>
    <text y="50" font-family="system-ui" font-size="10" fill="#71717a" text-anchor="middle">Settings</text>
  </g>
  <!-- Hidden aiGlow definition -->
  <defs>
    <linearGradient id="aiGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
</svg>