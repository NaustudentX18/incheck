<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 700" width="375" height="700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d12"/>
      <stop offset="100%" style="stop-color:#16161d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="375" height="700" fill="url(#bg)"/>
  <!-- Sheet handle -->
  <rect x="155" y="10" width="65" height="5" rx="2.5" fill="#1e1e28"/>
  <!-- Header -->
  <g transform="translate(20, 30)">
    <circle cx="14" cy="14" r="14" fill="#8b5cf6" opacity="0.2"/>
    <path d="M14 6 A8 8 0 0 1 14 22 A8 8 0 0 1 14 6" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <path d="M10 20 L18 20" stroke="#8b5cf6" stroke-width="2"/>
    <text x="38" y="12" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#f4f4f5">AI Organize</text>
    <text x="38" y="28" font-family="system-ui,sans-serif" font-size="12" fill="#71717a">Thinking...</text>
    <!-- Loading spinner -->
    <circle cx="340" cy="14" r="10" fill="none" stroke="#1e1e28" stroke-width="2"/>
    <path d="M340 4 A10 10 0 0 1 350 14" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <!-- Suggestions card -->
  <g transform="translate(20, 80)">
    <!-- Project row -->
    <text x="0" y="0" font-family="system-ui,sans-serif" font-size="11" fill="#71717a">Project</text>
    <rect x="0" y="10" width="335" height="36" rx="8" fill="#1e1e28"/>
    <text x="15" y="33" font-family="system-ui,sans-serif" font-size="13" fill="#f59e0b" font-weight="500">API</text>
    <!-- Priority row -->
    <text x="0" y="66" font-family="system-ui,sans-serif" font-size="11" fill="#71717a">Priority</text>
    <g transform="translate(0, 76)">
      <rect x="0" y="0" width="70" height="32" rx="16" fill="#1e1e28" stroke="#f59e0b" stroke-width="1.5"/>
      <circle cx="15" cy="16" r="5" fill="#f59e0b"/>
      <text x="28" y="20" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b">High</text>
      <rect x="80" y="0" width="80" height="32" rx="16" fill="#1e1e28"/>
      <circle cx="95" cy="16" r="5" fill="#71717a"/>
      <text x="108" y="20" font-family="system-ui,sans-serif" font-size="12" fill="#71717a">Medium</text>
      <rect x="170" y="0" width="60" height="32" rx="16" fill="#1e1e28"/>
      <circle cx="185" cy="16" r="5" fill="#10b981"/>
      <text x="198" y="20" font-family="system-ui,sans-serif" font-size="12" fill="#71717a">Low</text>
    </g>
    <!-- Subtasks row -->
    <text x="0" y="128" font-family="system-ui,sans-serif" font-size="11" fill="#71717a">Subtasks</text>
    <g transform="translate(0, 138)">
      <!-- Skeleton lines -->
      <rect x="0" y="0" width="260" height="20" rx="4" fill="#1e1e28"/>
      <rect x="0" y="28" width="200" height="20" rx="4" fill="#1e1e28"/>
      <rect x="0" y="56" width="150" height="20" rx="4" fill="#1e1e28"/>
    </g>
    <!-- Tags row -->
    <text x="0" y="230" font-family="system-ui,sans-serif" font-size="11" fill="#71717a">Suggested tags</text>
    <g transform="translate(0, 240)">
      <rect x="0" y="0" width="60" height="26" rx="13" fill="#8b5cf6" opacity="0.2"/>
      <text x="30" y="17" font-family="system-ui,sans-serif" font-size="12" fill="#8b5cf6" text-anchor="middle">api</text>
      <rect x="70" y="0" width="80" height="26" rx="13" fill="#8b5cf6" opacity="0.2"/>
      <text x="110" y="17" font-family="system-ui,sans-serif" font-size="12" fill="#8b5cf6" text-anchor="middle">security</text>
      <rect x="160" y="0" width="70" height="26" rx="13" fill="#8b5cf6" opacity="0.2"/>
      <text x="195" y="17" font-family="system-ui,sans-serif" font-size="12" fill="#8b5cf6" text-anchor="middle">backend</text>
    </g>
  </g>
  <!-- Action buttons -->
  <g transform="translate(20, 580)">
    <rect x="0" y="0" width="160" height="48" rx="24" fill="#1e1e28"/>
    <text x="80" y="29" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#71717a" text-anchor="middle">Dismiss</text>
    <rect x="175" y="0" width="160" height="48" rx="24" fill="#f59e0b"/>
    <path d="M200 18 L212 24 L200 30" fill="none" stroke="#0d0d12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="255" y="29" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#0d0d12" text-anchor="middle">Accept All</text>
  </g>
</svg>